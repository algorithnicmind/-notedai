<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noted - Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-body">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Noted</h1>
                <p id="auth-subtitle">Sign in to your account</p>
            </div>
            
            <form id="auth-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <p id="error-message" class="error-message hidden"></p>
                
                <button type="submit" id="submit-btn" class="primary-btn">Sign In</button>
            </form>
            
            <div class="auth-footer">
                <p id="toggle-text">Don't have an account? <a href="#" id="toggle-mode">Sign up</a></p>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
